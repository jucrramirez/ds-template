# Pipeline Configuration
# -----------------------------------------------------------------------------
# This file is the single source of truth for pipeline behavior.
# It should be validated/loaded by a config loader under `src/config/`.
#
# Replace the example schema/table/column values with your project’s domain.
# Keep the overall *shape* stable so notebooks stay thin and reusable logic
# reads settings from here instead of hardcoding.
# -----------------------------------------------------------------------------

database:
  # Multi-schema database layout. Add/remove schemas and tables as needed.
  schemas:
    default:
      tables:
        items:
          columns:
            - "id"
            - "title"
            - "body"

  # How row-level tables are aggregated into a per-entity document.
  aggregation:
    group_by: "id"
    text_columns:
      # Key must match a table name above.
      # Value can be a single column (string) or list of columns.
      items: "body"

  # Optional: logical column -> human label mapping for document formatting.
  column_mapping:
    id: "ID"
    title: "Title"
    body: "Body"

aws:
  # AWS region used for Bedrock runtime calls.
  region: "eu-west-1"
  bedrock:
    # Model ids / inference profile ids (pick ones available in your region).
    llm_model: "eu.anthropic.claude-3-haiku-20240307-v1:0"
    embedding_model: "cohere.embed-v4:0"

storage:
  # Relative paths resolved from the project root (where config/ lives).
  datasets: "files/datasets"
  tmp: "files/tmp"
  exports: "files/exports"

batch:
  # Retry/checkpoint behavior for long-running batch processing.
  max_retries: 5
  retry_delay: 2.0
  save_frequency: 100

llm:
  # LLM call behavior (temperature 0 = deterministic).
  temperature: 0
  max_tokens: 1000
  max_concurrency: 5
  batch_size: 25

embeddings:
  # Embedding generation parameters (example values; tune for your model).
  batch_size: 96
  input_type: "search_document"
  output_dimension: 1024
  embedding_types:
    - "float"
  truncate: "NONE"
  max_tokens: 5000
