# Pipeline Configuration
# -----------------------------------------------------------------------------
# This file is the single source of truth for pipeline behavior.
# It should be validated/loaded by a config loader under `src/config/`.
#
# Keep the overall *shape* stable so notebooks stay thin and reusable logic
# reads settings from here instead of hardcoding.
# -----------------------------------------------------------------------------

storage:
  # Relative paths resolved from the project root (where config/ lives).
  datasets: "files/datasets"
  tmp: "files/tmp"
  exports: "files/exports"

batch:
  # Retry/checkpoint behavior for long-running batch processing.
  max_retries: 5
  retry_delay: 2.0
  save_frequency: 100

llm:
  # Generic LLM call behavior (temperature 0 = deterministic).
  temperature: 0
  max_tokens: 1000
  max_concurrency: 5
  batch_size: 25

embeddings:
  # Embedding generation parameters (example values; tune for your model).
  batch_size: 96
  input_type: "search_document"
  output_dimension: 1024
  embedding_types:
    - "float"
  truncate: "NONE"
  max_tokens: 5000
